services:
  redis:
    image: redis/redis-stack:latest
    container_name: payohada-redis
    expose:
      - "6379"
      - "8001"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payohada-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payohada-frontend
    restart: unless-stopped
    volumes:
      - static_site:/app/dist
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: payohada-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  redis_data:
