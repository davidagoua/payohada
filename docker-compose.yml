services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payohada-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}  
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    profiles:
      - production

#  frontend:
#    build:
#      context: ./frontend
#      dockerfile: Dockerfile
#    container_name: payohada-frontend
#    restart: unless-stopped
#    env_file:
#      - ./frontend/.env 
#      - .env
    
  caddy:
    image: caddy 
    expose:
      - 80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv
    develop:
      watch:
        - action: sync+restart 
          path: ./frontend/dist 
          target: /srv
    profiles:
      - production


